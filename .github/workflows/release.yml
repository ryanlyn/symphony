name: release

# Builds the self-contained CLI release tree, packs it into an npm tarball, and attaches it to a
# GitHub release so it can be run with `npx <release-asset-url>`. Tag pushes and scheduled releases
# publish the tree to npm as the unscoped `lorenz` package via OIDC trusted publishing (no stored
# token). Manual runs produce prereleases from the current branch and never publish to npm.
on:
  push:
    tags:
      - "v*"
  schedule:
    # GitHub schedules use UTC; 20:00 UTC is 06:00 AEST.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # required for npm OIDC trusted publishing

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  npx-tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Decide scheduled release
        id: scheduled
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: |
          set -euo pipefail
          stable_tags="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)"
          latest_tag="$(printf '%s\n' "$stable_tags" | sort -V | tail -n 1)"
          if [ -n "$latest_tag" ]; then
            echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$latest_tag" ]; then
            echo "No stable release tag found; scheduled release will create the first daily release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commits_since_release="$(git rev-list --count "${latest_tag}..HEAD")"
          if [ "$commits_since_release" = "0" ]; then
            echo "No commits since ${latest_tag}; skipping scheduled release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found ${commits_since_release} commit(s) since ${latest_tag}; scheduled release will run."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Set up mise tools
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true

      - name: Setup pnpm store cache
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        run: pnpm install --frozen-lockfile

      - name: Bump scheduled release version
        id: bump
        if: ${{ github.event_name == 'schedule' && steps.scheduled.outputs.should_release == 'true' }}
        env:
          LATEST_TAG: ${{ steps.scheduled.outputs.latest_tag }}
        shell: bash
        run: |
          set -euo pipefail
          bump_args=()
          if [ -n "$LATEST_TAG" ]; then
            bump_args=(--base-version "${LATEST_TAG#v}")
          fi

          version="$(pnpm exec tsx scripts/bump-release-version.ts "${bump_args[@]}")"
          tag="v${version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${tag}"
          git tag "$tag"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "$tag"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        run: pnpm build

      - name: Stage CLI release
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        run: pnpm release:stage -- --force

      - name: Pack npx tarball
        id: pack
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        run: |
          staged="$(find dist/release -mindepth 1 -maxdepth 1 -type d | head -1)"
          version="$(node -p "require('./${staged}/RELEASE-MANIFEST.json').version")"
          tarball="$(npm pack "./${staged}" --pack-destination dist/release | tail -1)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tarball=dist/release/${tarball}" >> "$GITHUB_OUTPUT"
          echo "staged=${staged}" >> "$GITHUB_OUTPUT"

      - name: Publish release asset
        if: ${{ steps.scheduled.outputs.should_release != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          asset="${{ steps.pack.outputs.tarball }}"
          asset_name="$(basename "$asset")"
          version="${{ steps.pack.outputs.version }}"

          # Resolve the release tag, its predecessor (for the changelog diff), and whether this is a
          # prerelease. Scheduled and tag-push runs publish a stable release; manual dispatch runs
          # publish a throwaway prerelease and never reach npm.
          stable_tags="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V || true)"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            tag="${{ steps.bump.outputs.tag }}"
            prev_tag="${{ steps.scheduled.outputs.latest_tag }}"
            prerelease=false
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            prev_tag="$(printf '%s\n' "$stable_tags" | grep -Fx -B1 "$tag" | head -n1 || true)"
            [ "$prev_tag" = "$tag" ] && prev_tag=""
            prerelease=false
          else
            tag="v${version}-${GITHUB_SHA::7}"
            prev_tag="$(printf '%s\n' "$stable_tags" | tail -n1 || true)"
            prerelease=true
          fi

          download_url="https://github.com/${repo}/releases/download/${tag}/${asset_name}"

          # Ask GitHub to generate the "What's Changed" section (merged PRs + full-diff link) for the
          # range since the previous stable tag. Best-effort: a missing tag or first-ever release just
          # yields an empty changelog rather than failing the publish.
          gen_args=(-f tag_name="$tag")
          [ -n "$prev_tag" ] && gen_args+=(-f previous_tag_name="$prev_tag")
          changelog="$(gh api "repos/${repo}/releases/generate-notes" "${gen_args[@]}" -q .body 2>/dev/null || true)"

          {
            echo "## Install"
            echo
            echo "Run this release directly with \`npx\`:"
            echo
            echo '```sh'
            echo "npx ${download_url}"
            echo '```'
            if [ "$prerelease" = false ]; then
              echo
              echo "Or install the published npm package:"
              echo
              echo '```sh'
              echo "npm install -g lorenz@${version}"
              echo '```'
            fi
            if [ -n "$changelog" ]; then
              echo
              echo "$changelog"
            fi
          } > release-notes.md

          create_args=(--title "lorenz ${tag}" --notes-file release-notes.md)
          [ "$prerelease" = true ] && create_args+=(--prerelease)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
            gh release edit "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" "$asset" "${create_args[@]}"
          fi

      - name: Publish to npm
        # Tag and scheduled releases publish to npm. Auth is OIDC trusted publishing: npm exchanges
        # the GitHub id-token for a short-lived credential and emits build provenance, so no token is
        # stored. Configure the trusted publisher on npmjs.com (repo + this workflow file) first.
        # The staged root package.json already carries the published name (lorenz) and version.
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'schedule' && steps.scheduled.outputs.should_release == 'true') }}
        run: |
          npm install -g npm@latest # trusted publishing requires npm >= 11.5.1
          npm publish "${{ steps.pack.outputs.staged }}" --access public --provenance

[env]
_.file = ".env"

[hooks]
enter = "mise run check-env && prek install --hook-type pre-push -v"

[settings]
experimental = true

[tools]
prek = "0.4.3"
claude-code = "latest"
"npm:@openai/codex" = "latest"
# The ACP bridges are vendored at ts/vendor/ and resolved from the pnpm
# workspace; local runs do not use PATH installs. Remote SSH worker hosts
# install their own bridges.

[tasks.check-env]
run = '''
if [ -z "$LINEAR_API_KEY" ]; then
  echo "ERROR: LINEAR_API_KEY is not set. Copy .env.template to .env and fill in values." >&2
  exit 1
fi
if [ -z "$LINEAR_PROJECT_SLUG" ]; then
  echo "ERROR: LINEAR_PROJECT_SLUG is not set. Copy .env.template to .env and fill in values." >&2
  exit 1
fi
'''
description = "Validate required environment variables"
quiet = true

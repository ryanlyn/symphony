<svg role="img" aria-labelledby="t-poll-tick d-poll-tick" viewBox="0 0 720 820" width="100%" style="max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t-poll-tick">One poll tick (pollOnceUnlocked)</title>
  <desc id="d-poll-tick">Vertical sequence of the steps the runtime runs in a single poll tick: reload workflow, validate dispatch config, startup workspace cleanup on the first tick, stall reconciliation, tracker reconciliation, fetch candidate issues, eligibility filter and deterministic sort, dispatch via static host or pool-reserved two-phase, then assemble and emit the RuntimeSnapshot. A side note shows that a failed reload keeps last-good settings and emits workflow_reload_failed.</desc><rect x="0.75" y="0.75" width="718.50" height="818.50" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <defs>
    <marker id="arrow-poll-tick" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-accent-poll-tick" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14B8A6"/>
    </marker>
    <marker id="arrow-danger-poll-tick" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>
  <!-- title -->
  <text x="20" y="30" font-size="15" font-weight="600" fill="#0F172A">One poll tick · pollOnceUnlocked()</text>
  <!-- edges (drawn first so boxes sit on top) -->
  <g fill="none" stroke="#475569" stroke-width="1.5">
    <line x1="200" y1="116" x2="200" y2="140" marker-end="url(#arrow-poll-tick)"/>
    <line x1="200" y1="192" x2="200" y2="216" marker-end="url(#arrow-poll-tick)"/>
    <line x1="200" y1="268" x2="200" y2="292" marker-end="url(#arrow-poll-tick)"/>
    <line x1="200" y1="344" x2="200" y2="368" marker-end="url(#arrow-poll-tick)"/>
    <line x1="200" y1="420" x2="200" y2="444" marker-end="url(#arrow-poll-tick)"/>
    <line x1="200" y1="496" x2="200" y2="520" marker-end="url(#arrow-poll-tick)"/>
    <line x1="200" y1="572" x2="200" y2="596" marker-end="url(#arrow-poll-tick)"/>
  </g>
  <!-- final happy-path edge from dispatch into emit snapshot -->
  <line x1="200" y1="648" x2="200" y2="748" fill="none" stroke="#14B8A6" stroke-width="2" marker-end="url(#arrow-accent-poll-tick)"/>
  <!-- danger side-note edge from step 1 -->
  <path d="M380,88 H470" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-danger-poll-tick)"/>
  <rect x="402" y="74" width="48" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="426" y="83" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#7F1D1D">fails</text>
  <!-- step 1 -->
  <g>
    <rect x="20" y="60" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">1 · Reload workflow (stamp changed?)</text>
    <text x="200" y="99" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">reloadWorkflowIfConfigured()</text>
  </g>
  <!-- step 2 -->
  <g>
    <rect x="20" y="136" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="157" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">2 · Validate dispatch config</text>
    <text x="200" y="175" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">validateDispatch(settings)</text>
  </g>
  <!-- step 3 -->
  <g>
    <rect x="20" y="212" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="233" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">3 · Startup workspace cleanup (first tick)</text>
    <text x="200" y="251" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">cleanupTerminalWorkspacesOnce()</text>
  </g>
  <!-- step 4 -->
  <g>
    <rect x="20" y="288" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="309" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">4 · Stall reconcile (turn/stall timeouts)</text>
    <text x="200" y="327" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">reconcileStalledRuns()</text>
  </g>
  <!-- step 5 -->
  <g>
    <rect x="20" y="364" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">5 · Tracker reconcile (refresh tracked)</text>
    <text x="200" y="403" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">reconcileTrackedIssues()</text>
  </g>
  <!-- step 6 -->
  <g>
    <rect x="20" y="440" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="461" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">6 · Fetch candidate issues</text>
    <text x="200" y="479" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">client.fetchCandidateIssues()</text>
  </g>
  <!-- step 7 -->
  <g>
    <rect x="20" y="516" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="537" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">7 · Eligibility filter + sort</text>
    <text x="200" y="555" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">orchestrator.eligibleIssues(issues)</text>
  </g>
  <!-- step 8 -->
  <g>
    <rect x="20" y="592" width="360" height="56" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="200" y="613" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">8 · Dispatch: static host OR pool-reserved</text>
    <text x="200" y="631" text-anchor="middle" font-size="11" fill="#475569">two-phase claim per eligible issue</text>
  </g>
  <!-- step 9 (accent: terminal output of the tick) -->
  <g>
    <rect x="20" y="748" width="360" height="56" rx="10" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5"/>
    <text x="200" y="769" text-anchor="middle" font-size="13" font-weight="600" fill="#134E4A">9 · Assemble &amp; emit RuntimeSnapshot</text>
    <text x="200" y="787" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">snapshot() → subscribers</text>
  </g>
  <!-- danger side-note box -->
  <g>
    <rect x="470" y="56" width="232" height="78" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="586" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#7F1D1D">reload fails →</text>
    <text x="586" y="96" text-anchor="middle" font-size="11" fill="#7F1D1D">keep last-good settings + emit</text>
    <text x="586" y="115" text-anchor="middle" font-size="11" fill="#7F1D1D" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">workflow_reload_failed</text>
  </g>
  <!-- legend -->
  <g>
    <rect x="470" y="744" width="232" height="60" rx="8" fill="#FBFCFE" stroke="#E2E8F0"/>
    <rect x="484" y="758" width="16" height="12" rx="3" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="508" y="765" font-size="11" fill="#334155" dominant-baseline="middle">engine step</text>
    <rect x="610" y="758" width="16" height="12" rx="3" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5"/>
    <text x="634" y="765" font-size="11" fill="#334155" dominant-baseline="middle">emit</text>
    <rect x="484" y="782" width="16" height="12" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="508" y="789" font-size="11" fill="#334155" dominant-baseline="middle">failure path</text>
  </g>
</svg>

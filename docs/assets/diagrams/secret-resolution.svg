<svg role="img" aria-labelledby="t-secret-resolution d-secret-resolution" viewBox="0 0 720 760" width="100%" style="max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t-secret-resolution">Secret resolution decision tree</title>
  <desc id="d-secret-resolution">How resolveConfiguredSecret turns a config value into a secret: whole-value $VAR env substitution first, then a per-provider env fallback, then op:// references read through the 1Password CLI.</desc><rect x="0.75" y="0.75" width="718.50" height="758.50" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <defs>
    <marker id="arrow-secret-resolution" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-accent-secret-resolution" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14B8A6"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="20" y="30" font-size="15" font-weight="600" fill="#0F172A">Secret resolution decision tree</text>
  <text x="20" y="48" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">resolveConfiguredSecret(value, env, fallbackEnvName)</text>
  <!-- ===== Edges (drawn first, under nodes) ===== -->
  <!-- input -> decision1 -->
  <path d="M360,108 L360,140" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- decision1 (is $VAR?) yes -> decision2 -->
  <path d="M360,210 L360,242" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- decision1 no (literal value) -> down right rail to fallback merge -->
  <path d="M470,175 L560,175 L560,332" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- decision2 (env non-empty?) yes -> use env value -->
  <path d="M360,312 L360,344" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- decision2 no (empty/unset) -> fallback -->
  <path d="M250,277 L150,277 L150,332" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- use env value -> merge into op check -->
  <path d="M360,408 L360,440" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- fallback -> merge into op check -->
  <path d="M150,408 L150,470 L300,470" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- literal value rail -> merge into op check -->
  <path d="M560,408 L560,470 L420,470" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- op:// decision yes -> op read -->
  <path d="M360,540 L360,572" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-secret-resolution)"/>
  <!-- op read -> secret (accent) -->
  <path d="M360,646 L360,672" stroke="#14B8A6" stroke-width="2" fill="none" marker-end="url(#arrow-accent-secret-resolution)"/>
  <!-- op:// decision no -> straight to secret (accent), right side bypass -->
  <path d="M540,490 L660,490 L660,700 L450,700" stroke="#14B8A6" stroke-width="2" fill="none" marker-end="url(#arrow-accent-secret-resolution)"/>
  <!-- ===== Edge labels (white chips) ===== -->
  <!-- decision1 no -->
  <g><rect x="478" y="166" width="62" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/><text x="509" y="175" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#475569">no (literal)</text></g>
  <!-- decision1 yes -->
  <g><rect x="370" y="216" width="34" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/><text x="387" y="225" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#134E4A">yes</text></g>
  <!-- decision2 no -->
  <g><rect x="160" y="268" width="86" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/><text x="203" y="277" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#475569">empty / unset</text></g>
  <!-- decision2 yes -->
  <g><rect x="370" y="318" width="34" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/><text x="387" y="327" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#134E4A">yes</text></g>
  <!-- op:// yes -->
  <g><rect x="370" y="546" width="34" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/><text x="387" y="555" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#134E4A">yes</text></g>
  <!-- op:// no -->
  <g><rect x="548" y="481" width="106" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/><text x="601" y="490" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#475569">no (use as-is)</text></g>
  <!-- ===== Nodes ===== -->
  <!-- Input -->
  <g>
    <rect x="180" y="60" width="360" height="48" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="360" y="79" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">config value</text>
    <text x="360" y="96" text-anchor="middle" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">trackers.linear.api_key</text>
  </g>
  <!-- Decision 1: is exactly $VAR? -->
  <g>
    <rect x="220" y="140" width="280" height="70" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="360" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">value is exactly $VAR?</text>
    <text x="360" y="186" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">/^\$[A-Za-z_][A-Za-z0-9_]*$/</text>
    <text x="360" y="202" text-anchor="middle" font-size="11" fill="#475569">whole-value match, not substring</text>
  </g>
  <!-- Decision 2: env[VAR] non-empty? -->
  <g>
    <rect x="250" y="242" width="220" height="70" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="360" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">env[VAR] non-empty?</text>
    <text x="360" y="290" text-anchor="middle" font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">env[VAR] ?? ""</text>
  </g>
  <!-- Use env value -->
  <g>
    <rect x="250" y="344" width="220" height="64" rx="10" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5"/>
    <text x="360" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#134E4A">use env value</text>
    <text x="360" y="390" text-anchor="middle" font-size="11" fill="#134E4A">non-empty result wins</text>
  </g>
  <!-- Fallback -->
  <g>
    <rect x="20" y="332" width="260" height="76" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
    <text x="150" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="#14532D">provider env fallback</text>
    <text x="150" y="378" text-anchor="middle" font-size="12" fill="#14532D" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">env[LINEAR_API_KEY]</text>
    <text x="150" y="395" text-anchor="middle" font-size="11" fill="#14532D">provider.envFallbacks.apiKey</text>
  </g>
  <!-- op:// decision -->
  <g>
    <rect x="300" y="440" width="240" height="100" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="420" y="472" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81">resolved value is</text>
    <text x="420" y="492" text-anchor="middle" font-size="13" font-weight="600" fill="#312E81"><tspan font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">op://...</tspan> ?</text>
    <text x="420" y="512" text-anchor="middle" font-size="11" fill="#475569">a bare op:// fallback</text>
    <text x="420" y="528" text-anchor="middle" font-size="11" fill="#475569">resolves with no inline value</text>
  </g>
  <!-- op read via 1Password CLI -->
  <g>
    <rect x="220" y="572" width="280" height="74" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="360" y="596" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">1Password CLI</text>
    <text x="360" y="616" text-anchor="middle" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">op --version</text>
    <text x="360" y="634" text-anchor="middle" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">op read &lt;ref&gt;</text>
  </g>
  <!-- Resolved secret (accent) -->
  <g>
    <rect x="270" y="672" width="180" height="56" rx="10" fill="#CCFBF1" stroke="#14B8A6" stroke-width="2"/>
    <text x="360" y="696" text-anchor="middle" font-size="13" font-weight="600" fill="#134E4A">resolved secret</text>
    <text x="360" y="714" text-anchor="middle" font-size="11" fill="#134E4A">stdout.trim()</text>
  </g>
  <!-- ===== Legend ===== -->
  <g>
    <rect x="568" y="60" width="132" height="92" rx="8" fill="#FBFCFE" stroke="#E2E8F0" stroke-width="1"/>
    <text x="580" y="78" font-size="11" font-weight="600" fill="#0F172A">Legend</text>
    <rect x="580" y="86" width="14" height="11" rx="3" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="600" y="92" font-size="11" fill="#475569" dominant-baseline="middle">decision</text>
    <rect x="580" y="104" width="14" height="11" rx="3" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
    <text x="600" y="110" font-size="11" fill="#475569" dominant-baseline="middle">env fallback</text>
    <rect x="580" y="122" width="14" height="11" rx="3" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="600" y="128" font-size="11" fill="#475569" dominant-baseline="middle">external CLI</text>
    <rect x="580" y="140" width="14" height="11" rx="3" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5"/>
    <text x="600" y="146" font-size="11" fill="#475569" dominant-baseline="middle">resolved</text>
  </g>
</svg>

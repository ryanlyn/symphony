<svg role="img" aria-labelledby="t-two-phase-dispatch d-two-phase-dispatch" viewBox="0 0 860 560" width="100%" style="max-width:860px;height:auto" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t-two-phase-dispatch">Pool-governed two-phase dispatch</title>
  <desc id="d-two-phase-dispatch">Sequence across Orchestrator, DispatchCoordinator, WorkerPool and AgentRunner: the orchestrator claims a host-less reserved slot and emits run_reserving, the coordinator acquires a run slot by leasing a workerHost and opening an MCP endpoint, the orchestrator binds the reservation and emits run_started, the AgentRunner runs on the workerHost, and the slot is released or failed. A no-capacity branch cancels the reservation so the issue stays eligible.</desc><rect x="0.75" y="0.75" width="858.50" height="558.50" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <defs>
    <marker id="arrow-two-phase-dispatch" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-accent-two-phase-dispatch" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14B8A6"/>
    </marker>
    <marker id="arrow-danger-two-phase-dispatch" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="20" y="30" font-size="15" font-weight="600" fill="#0F172A">Pool-governed two-phase dispatch</text>
  <!-- Lifeline header boxes -->
  <!-- Orchestrator: engine -->
  <g>
    <rect x="40" y="48" width="150" height="40" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="115" y="68" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#312E81">Orchestrator</text>
  </g>
  <!-- DispatchCoordinator: engine -->
  <g>
    <rect x="280" y="48" width="170" height="40" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="365" y="68" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#312E81">DispatchCoordinator</text>
  </g>
  <!-- WorkerPool: ext -->
  <g>
    <rect x="540" y="48" width="140" height="40" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
    <text x="610" y="68" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#14532D">WorkerPool</text>
  </g>
  <!-- AgentRunner: leaf -->
  <g>
    <rect x="730" y="48" width="110" height="40" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="785" y="68" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#334155">AgentRunner</text>
  </g>
  <!-- Lifelines -->
  <line x1="115" y1="88" x2="115" y2="500" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="3 4"/>
  <line x1="365" y1="88" x2="365" y2="500" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="3 4"/>
  <line x1="610" y1="88" x2="610" y2="500" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="3 4"/>
  <line x1="785" y1="88" x2="785" y2="500" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="3 4"/>
  <!-- Phase 1 band label -->
  <text x="40" y="112" font-size="11" font-weight="600" fill="#475569">Phase 1 - reserve (host-less)</text>
  <!-- 1. claim -> reserved (self at orchestrator) -->
  <path d="M115,130 L195,130 L195,150 L121,150" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="198" y="120" width="200" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="204" y="130" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">claim()</tspan> &#8594; {kind:'reserved'}</text>
  </g>
  <!-- 2. emit run_reserving (accent, off the orchestrator) -->
  <line x1="115" y1="168" x2="115" y2="168" stroke="none"/>
  <g>
    <rect x="40" y="160" width="150" height="20" rx="4" fill="#CCFBF1" stroke="#14B8A6"/>
    <text x="115" y="170" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#134E4A">emit <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">run_reserving</tspan></text>
  </g>
  <!-- 3. acquireRunSlot orchestrator -> coordinator -->
  <line x1="115" y1="200" x2="359" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="150" y="190" width="178" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="239" y="200" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">coordinator.acquireRunSlot</tspan></text>
  </g>
  <!-- 4. pool.acquire coordinator -> workerpool -->
  <line x1="365" y1="228" x2="604" y2="228" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="400" y="218" width="180" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="490" y="228" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">pool.acquire</tspan> (lease host)</text>
  </g>
  <!-- 5. leased: workerHost workerpool -> coordinator (return) -->
  <line x1="610" y1="256" x2="371" y2="256" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="412" y="246" width="186" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="505" y="256" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A">leased &#8594; <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">workerHost</tspan></text>
  </g>
  <!-- 6. coordinator opens MCP endpoint (self) -->
  <path d="M365,278 L445,278 L445,298 L371,298" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="448" y="278" width="170" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="454" y="288" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A">open per-run MCP endpoint</text>
  </g>
  <!-- Phase 2 band label -->
  <text x="40" y="324" font-size="11" font-weight="600" fill="#475569">Phase 2 - bind &amp; run</text>
  <!-- 7. bound: workerHost coordinator -> orchestrator (return) -->
  <line x1="365" y1="342" x2="121" y2="342" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="150" y="332" width="180" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="240" y="342" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A">bound &#8594; <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">slot.workerHost</tspan></text>
  </g>
  <!-- 8. bindReservation (self at orchestrator) + emit run_started -->
  <path d="M115,370 L195,370 L195,390 L121,390" fill="none" stroke="#14B8A6" stroke-width="2" marker-end="url(#arrow-accent-two-phase-dispatch)"/>
  <g>
    <rect x="198" y="360" width="218" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="204" y="370" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">bindReservation(host)</tspan> &#8594; RunningEntry</text>
  </g>
  <g>
    <rect x="198" y="384" width="150" height="20" rx="4" fill="#CCFBF1" stroke="#14B8A6"/>
    <text x="273" y="394" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#134E4A">emit <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">run_started</tspan></text>
  </g>
  <!-- 9. run on workerHost orchestrator -> agentrunner (accent happy path, long arrow) -->
  <line x1="115" y1="424" x2="779" y2="424" stroke="#14B8A6" stroke-width="2" marker-end="url(#arrow-accent-two-phase-dispatch)"/>
  <g>
    <rect x="400" y="414" width="200" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="500" y="424" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A">runClaim() on <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">workerHost</tspan></text>
  </g>
  <!-- 10. slot.release / slot.fail agentrunner -> workerpool (settle) -->
  <line x1="785" y1="452" x2="616" y2="452" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-two-phase-dispatch)"/>
  <g>
    <rect x="592" y="442" width="200" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="692" y="452" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#0F172A"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">slot.release</tspan> / <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">slot.fail</tspan></text>
  </g>
  <!-- No-capacity branch box (danger) -->
  <g>
    <rect x="280" y="478" width="412" height="44" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="294" y="495" dominant-baseline="middle" font-size="11" font-weight="600" fill="#7F1D1D">no_capacity branch</text>
    <text x="294" y="511" dominant-baseline="middle" font-size="11" font-weight="500" fill="#7F1D1D"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">cancelReservation</tspan> (no backoff) &#8594; <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">dispatch_skipped</tspan> &#8594; stays eligible</text>
  </g>
  <!-- danger arrow from coordinator phase-1 down into branch -->
  <path d="M365,300 L365,470 L365,472" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-danger-two-phase-dispatch)"/>
  <g>
    <rect x="262" y="430" width="118" height="20" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="321" y="440" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#7F1D1D"><tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12">worker_host_capacity</tspan></text>
  </g>
  <!-- Legend -->
  <g>
    <rect x="700" y="478" width="142" height="64" rx="8" fill="#FBFCFE" stroke="#E2E8F0"/>
    <line x1="710" y1="492" x2="730" y2="492" stroke="#14B8A6" stroke-width="2"/>
    <text x="736" y="492" dominant-baseline="middle" font-size="10" fill="#475569">happy path</text>
    <line x1="710" y1="508" x2="730" y2="508" stroke="#475569" stroke-width="1.5"/>
    <text x="736" y="508" dominant-baseline="middle" font-size="10" fill="#475569">call</text>
    <line x1="710" y1="524" x2="730" y2="524" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="736" y="524" dominant-baseline="middle" font-size="10" fill="#475569">return</text>
  </g>
</svg>

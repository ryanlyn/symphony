failures:
  - id: 7
    scenario: S-209
    status: FIXED
    invariant_violated: "Workspace path SHALL be a strict descendant of the workspace root"
    code_location: "ts/packages/workspace/src/index.ts — workspacePath (line ~22)"
    fix_applied: "workspacePath now throws when safeIdentifier produces an empty string, preventing root-equal paths."

  - id: 9
    scenario: S-184
    status: OPEN
    invariant_violated: "WHEN a non-unstarted issue has non-terminal blockers, THE SYSTEM SHALL still consider it eligible (blockers only gate unstarted issues)"
    code_location: "ts/packages/dispatch/src/index.ts — issueHasOpenBlockers (line ~43)"
    explanation: >
      The function determines "unstarted" via issue.stateType === "unstarted" || issue.state.trim().toLowerCase() === "todo".
      An issue with stateType="started" (explicitly categorized by the tracker as started) but state="Todo" (state name happens to be "Todo")
      is treated as unstarted due to the ||. This means a started issue is incorrectly gated by blockers because its state name matches
      the hardcoded string "todo".
    reproduction: |
      import { issueHasOpenBlockers } from "@lorenz/dispatch";
      const issue = {
        ...validIssue,
        state: "Todo",
        stateType: "started",
        blockers: [{ state: "In Progress" }],
      };
      issueHasOpenBlockers(issue, settings); // true — WRONG, stateType says it's started
    suggested_fix: |
      const unstarted = issue.stateType
        ? issue.stateType === "unstarted"
        : issue.state.trim().toLowerCase() === "todo";

  - id: 11
    scenario: S-1171
    status: OPEN
    severity: High
    invariant_violated: "WHEN a non-unstarted issue has blockers added during execution, THE SYSTEM SHALL NOT abort the running worker (blockers only gate unstarted issues)"
    code_location: "ts/packages/runtime/src/index.ts — reconcileTrackedIssues (line ~570) calling issueHasOpenBlockers from ts/packages/dispatch/src/index.ts (line ~26)"
    explanation: >
      The reconcileTrackedIssues method checks !issueHasOpenBlockers(issue, settings) to decide whether to keep a running worker alive.
      Due to the known || bug in issueHasOpenBlockers (issue.stateType === "unstarted" || issue.state.trim().toLowerCase() === "todo"),
      a running issue with state="Todo" and stateType="started" is incorrectly identified as blocked — causing the already-running worker to be aborted.
      This is a higher-severity manifestation of the dispatch-blocking bug (Failure 10/S-184): it doesn't just prevent dispatch,
      it terminates active work.
    reproduction: |
      const result = await runScenario({
        issues: [makeIssue("x", "X-1", {
          state: "Todo",
          stateType: "started",
          blockers: [],
        })],
        runnerConfig: { defaultBehavior: { turnCount: 5, latencyPerTurnMs: 100 } },
        pollTicks: 3,
        tickDelayMs: 200,
        timedMutations: [{
          afterMs: 100,
          mutate: { type: "add_blocker", issueId: "x", blockerId: "new-block" },
        }],
      });
      // EXPECTED: Worker continues (stateType="started" means not gated by blockers)
      // ACTUAL: run_reconciled event fires — worker is aborted
      result.events.some(e => e.type === "run_reconciled"); // true — BUG
    suggested_fix: |
      // Same root cause as S-184. Prefer stateType when available in issueHasOpenBlockers:
      const unstarted = issue.stateType
        ? issue.stateType === "unstarted"
        : issue.state.trim().toLowerCase() === "todo";
      // Additionally, reconciliation could skip blocker check for already-running issues.

  - id: 12
    scenario: S-1251
    status: OPEN
    severity: High
    invariant_violated: "Per-state concurrency cap SHALL be enforced regardless of state name casing"
    code_location: "ts/packages/orchestrator/src/index.ts — eligibleIssues / claim (runningByState Map construction) and ts/packages/dispatch/src/index.ts — dispatchBlockReason (line 64)"
    explanation: >
      The runningByState Map is built using raw entry.issue.state strings as keys (case-sensitive). However, settingsForIssueState
      resolves the per-state cap via normalizeStateName() which does state.trim().toLowerCase(). Two issues with states "In Progress"
      and "in progress" are logically the same state but get separate counts in the Map, allowing both to bypass the per-state cap.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"i1","identifier":"I-1","title":"T1","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1},{"id":"i2","identifier":"I-2","title":"T2","state":"in progress","stateType":"started","labels":[],"blockers":[],"priority":2}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5},"statusOverrides":{"In Progress":{"agent":{"maxConcurrentAgents":1}}}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":300}},"pollTicks":1,"waitForRuns":false,"assertions":[{"type":"concurrency_cap","maxConcurrent":1}]}'
    suggested_fix: |
      const normalizedState = entry.issue.state.trim().toLowerCase();
      runningByState.set(normalizedState, (runningByState.get(normalizedState) ?? 0) + 1);

  - id: 13
    scenario: S-1252
    status: OPEN
    severity: Medium
    invariant_violated: "Reconciliation SHALL abort excess running slots when ensemble size is dynamically reduced"
    code_location: "ts/packages/runtime/src/index.ts — reconcileTrackedIssues (line ~566-574)"
    explanation: >
      reconcileTrackedIssues only checks issueIsActive, routedToThisWorker, and !issueHasOpenBlockers to decide whether to continue
      running an issue. It does NOT check whether the number of running slots exceeds the issue's current ensemble size. When an
      ensemble label changes from ensemble:3 to ensemble:1, the 2 excess slots are never aborted.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"e1","identifier":"E-1","title":"Ensemble Shrink","state":"In Progress","stateType":"started","labels":["ensemble:3"],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":10}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":10,"latencyPerTurnMs":150}},"pollTicks":8,"tickDelayMs":60,"waitForRuns":false,"timedMutations":[{"afterMs":350,"mutate":{"type":"change_labels","issueId":"e1","labels":["ensemble:1"]}}],"assertions":[{"type":"concurrency_cap","maxConcurrent":1}]}'
    suggested_fix: |
      const currentSize = ensembleSize(issue) ?? settings.agent.ensembleSize;
      const runningSlots = [...this.orchestrator.state.running.values()]
        .filter(e => e.issue.id === issue.id);
      if (runningSlots.length > currentSize) {
        for (const excess of runningSlots.slice(currentSize)) {
          this.abortSlotRun(excess);
        }
      }

  - id: 14
    scenario: S-1253
    status: OPEN
    severity: Medium
    invariant_violated: "Per-state concurrency cap SHALL count distinct issues, not individual ensemble slots"
    code_location: "ts/packages/dispatch/src/index.ts — dispatchBlockReason (line 63-64) and ts/packages/orchestrator/src/index.ts — eligibleIssues (runningByState construction)"
    explanation: >
      The runningByState map counts each running entry (each ensemble slot) as a separate agent toward the per-state cap. An
      ensemble:3 issue occupies 3 units against a per-state cap of 2, preventing full ensemble deployment. The per-state cap
      was designed to limit distinct issues, not individual ensemble slots of the same issue.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"e1","identifier":"E-1","title":"Ensemble vs Per-State Cap","state":"In Progress","stateType":"started","labels":["ensemble:3"],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":10},"statusOverrides":{"In Progress":{"agent":{"maxConcurrentAgents":2}}}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":3,"latencyPerTurnMs":100}},"pollTicks":1,"waitForRuns":false,"assertions":[{"type":"running_count","expected":3}]}'
    suggested_fix: |
      const issuesByState = new Map<string, Set<string>>();
      for (const entry of this.state.running.values()) {
        const key = entry.issue.state.trim().toLowerCase();
        if (!issuesByState.has(key)) issuesByState.set(key, new Set());
        issuesByState.get(key)!.add(entry.issue.id);
      }
      // Then check issuesByState.get(state)?.size against cap

  - id: 15
    scenario: S-1253
    round: 3
    status: OPEN
    severity: High
    invariant_violated: "Ensemble retry SHALL be per-slot, not per-issue — un-dispatched slots must remain eligible during another slot's retry delay"
    code_location: "ts/packages/orchestrator/src/index.ts — eligibleIssues (line 68) and finish (line 210)"
    explanation: >
      The retryAttempts Map is keyed by issueId, not by (issueId, slotIndex). When one ensemble slot fails and creates a retry entry
      with dueAt in the future, the check at line 68 (if (retry && retry.dueAt > now) return false) blocks the ENTIRE issue from
      dispatch — starving all other un-dispatched slots until the retry delay expires.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"ens-1","identifier":"ENS-1","title":"Ensemble with 2 slots","state":"In Progress","stateType":"started","labels":["ensemble:2"],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":10,"maxRetryBackoffMs":5000}},"runnerConfig":{"byId":{"ens-1":{"shouldSucceed":false,"turnCount":1,"latencyPerTurnMs":0}}},"pollTicks":4,"tickDelayMs":100,"assertions":[{"type":"event_occurred","eventType":"run_started","messageContains":"slot=1"}]}'
    suggested_fix: "Key retry entries by slotKey, or exempt unclaimed slots from the retry dueAt gate."

  - id: 16
    scenario: S-1254
    status: OPEN
    severity: Low
    invariant_violated: "dispatchBlockReason SHALL report a reason for ALL blocked issues (observability invariant)"
    code_location: "ts/packages/dispatch/src/index.ts — dispatchBlockReason (lines 55-58)"
    explanation: >
      dispatchBlockReason returns null (no reason) for issues that fail basic eligibility checks (inactive, unrouted, has open blockers).
      This means these issues never appear in blockedDispatches. They are silently filtered from both the eligible list AND the blocked
      list, making them invisible to monitoring.
    suggested_fix: "Return specific reasons like 'open_blockers', 'not_active', 'not_routed'."

  - id: 17
    scenario: S-1254
    round: 4
    status: OPEN
    severity: Low
    invariant_violated: "reconciliationStopReason SHALL distinguish terminal from merely inactive states"
    code_location: "ts/packages/policies/src/reconciliation.ts — reconciliationStopReason"
    explanation: >
      The function checks !issueIsActive(issue, settings) first and returns "terminal" whenever this is true. But issueIsActive returns
      false for ANY state not in activeStates — including paused/hold states that are also not in terminalStates. The "inactive" return
      value is dead code for its intended purpose.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"i1","identifier":"I-1","title":"Mislabeled Reconciliation","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5}},"runnerConfig":{"defaultBehavior":{"turnCount":5,"latencyPerTurnMs":100}},"pollTicks":3,"tickDelayMs":150,"timedMutations":[{"afterMs":100,"mutate":{"type":"change_state","issueId":"i1","state":"On Hold","stateType":"started"}}],"assertions":[{"type":"event_occurred","eventType":"run_reconciled","messageContains":"terminal"},{"type":"event_not_occurred","eventType":"workspace_cleanup"}]}'
    suggested_fix: |
      if (isTerminalState(issue.state, settings.tracker.terminalStates)) return "terminal";
      if (!issueIsActive(issue, settings)) return "inactive";

  - id: 18
    scenario: S-1255
    status: OPEN
    severity: High
    invariant_violated: "Ensemble retry SHALL NOT permanently degrade ensemble:N to effective ensemble:1"
    code_location: "ts/packages/orchestrator/src/index.ts — finish (line 210) and claim (line 109-113)"
    explanation: >
      After slot 0 fails, finish() stores a retry entry with slotIndex:0. When the retry fires, claim() calls firstUnclaimedSlot
      with preferredSlotIndex=0, dispatches only slot 0, and only one slot is dispatched per claim() call. The retry cycle repeats:
      dispatch slot 0 -> fail -> retry with slot 0. Slots 1-N are permanently starved.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"i1","identifier":"I-1","title":"Ensemble Retry Blocks Other Slots","state":"In Progress","stateType":"started","labels":["ensemble:3"],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":10,"maxRetryBackoffMs":50}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":false,"turnCount":1,"latencyPerTurnMs":0}},"pollTicks":5,"tickDelayMs":100,"assertions":[{"type":"event_occurred","eventType":"run_started","messageContains":"I-1 slot=1"}]}'
    suggested_fix: "After a retry claim succeeds, loop to claim remaining unclaimed slots for the same issue."

  - id: 19
    scenario: S-1255
    round: 5
    status: OPEN
    severity: Medium
    invariant_violated: "Per-state concurrency cap SHALL be enforced regardless of whitespace in state names"
    code_location: "ts/packages/orchestrator/src/index.ts — eligibleIssues / claim (runningByState Map) and ts/packages/dispatch/src/index.ts — dispatchBlockReason (line 64)"
    explanation: >
      Same class of bug as Failure 12 (case-sensitivity), but for whitespace. States "In Progress" and " In Progress " normalize
      to the same override via trim().toLowerCase(), but get separate counts in the raw runningByState Map.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"a","identifier":"A-1","title":"Issue A","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1},{"id":"b","identifier":"B-1","title":"Issue B","state":" In Progress ","stateType":"started","labels":[],"blockers":[],"priority":2},{"id":"c","identifier":"C-1","title":"Issue C","state":" In Progress ","stateType":"started","labels":[],"blockers":[],"priority":3}],"settingsOverrides":{"agent":{"maxConcurrentAgents":10},"statusOverrides":{"In Progress":{"agent":{"maxConcurrentAgents":2}}}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":200}},"pollTicks":1,"waitForRuns":false,"assertions":[{"type":"concurrency_cap","maxConcurrent":2}]}'
    suggested_fix: "Same as Failure 12: normalize state keys with trim().toLowerCase()."

  - id: 20
    scenario: S-1256
    status: OPEN
    severity: High
    invariant_violated: "Aborting runs for issue X SHALL NOT affect runs belonging to a different issue Y"
    code_location: "ts/packages/runtime/src/index.ts — abortIssueRuns (uses key.startsWith(issueId + ':'))"
    explanation: >
      slotKey format is "issueId:slotIndex". abortIssueRuns uses key.startsWith(issueId + ':') to find entries. If issue A has id='a'
      and issue B has id='a:0', then B's slot key is 'a:0:0' which matches the prefix 'a:'. When issue A goes terminal and is aborted,
      issue B's handle is collaterally aborted, creating a zombie entry in the running map that can never be cleaned up.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"a:0","identifier":"COLON-1","title":"Issue with colon in ID","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":2},{"id":"a","identifier":"PREFIX-1","title":"Prefix issue","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5}},"runnerConfig":{"byId":{"a":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":10},"a:0":{"shouldSucceed":true,"turnCount":5,"latencyPerTurnMs":100}}},"pollTicks":5,"tickDelayMs":200,"timedMutations":[{"afterMs":50,"mutate":{"type":"change_state","issueId":"a","state":"Done","stateType":"completed"}}],"assertions":[{"type":"event_occurred","eventType":"run_completed","messageContains":"COLON-1"}]}'
    suggested_fix: |
      private abortIssueRuns(issueId: string): void {
        for (const [key, handle] of this.activeRuns.entries()) {
          const keyIssueId = key.substring(0, key.lastIndexOf(':'));
          if (keyIssueId === issueId) {
            handle.finishExternally();
          }
        }
      }

  - id: 21
    scenario: S-1257
    status: OPEN
    severity: Low
    invariant_violated: "All issues prevented from dispatch SHALL be visible in blockedDispatches with a reason"
    code_location: "ts/packages/dispatch/src/index.ts — dispatchBlockReason (lines 55-58)"
    explanation: >
      dispatchBlockReason returns null for issues failing basic eligibility (open blockers, not routed, inactive). These issues are never
      added to blockedDispatches, creating an observability blind spot. Operators cannot determine why these issues are stuck.
    suggested_fix: "Return distinct reasons: 'open_blockers', 'not_active', 'not_routed', 'missing_fields'."

  - id: 22
    scenario: S-1258
    status: OPEN
    severity: Medium
    invariant_violated: "claim() SHALL respect retry delay — same issue SHALL NOT be re-claimed within retry period"
    code_location: "ts/packages/orchestrator/src/index.ts — claim (lines 91-148)"
    explanation: >
      claim() does not check retryAttempts for a future dueAt. The retry-delay enforcement only exists in eligibleIssues(). When the
      same issue ID appears twice in the eligible list (tracker duplicates), the first dispatch finishes (setting continuation retry
      with future dueAt), and the second dispatch successfully claims the same slot because finish() already removed it from claimed.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"dup-me","identifier":"DUP-1","title":"First copy of issue","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1},{"id":"dup-me","identifier":"DUP-1","title":"Second copy same ID","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5,"maxRetryBackoffMs":60000}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":0}},"pollTicks":1,"assertions":[{"type":"concurrency_cap","maxConcurrent":1}]}'
    suggested_fix: |
      const existingRetry = this.state.retryAttempts.get(issue.id);
      if (existingRetry && existingRetry.dueAt.getTime() > this.clock.now().getTime()) return null;

  - id: 23
    scenario: S-1258
    round: 8
    status: OPEN
    severity: Medium
    invariant_violated: "Per-host capacity SHALL be enforced even for empty-string hosts"
    code_location: "ts/packages/orchestrator/src/index.ts — selectWorkerHost (line 153: if (entry.workerHost))"
    explanation: >
      The running count loop uses if (entry.workerHost) which is falsy for empty string ''. Entries dispatched to the '' host are
      never counted, so selectLeastLoadedHost always sees count=0 for that host, allowing unlimited concurrent dispatch regardless
      of maxConcurrentAgentsPerHost.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"issue-1","identifier":"TEST-1","title":"Test 1","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":2},{"id":"issue-2","identifier":"TEST-2","title":"Test 2","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":2},{"id":"issue-3","identifier":"TEST-3","title":"Test 3","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":2}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5},"worker":{"sshHosts":["","host-b"],"maxConcurrentAgentsPerHost":1}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":200}},"pollTicks":1,"waitForRuns":false,"assertions":[{"type":"concurrency_cap","maxConcurrent":2}]}'
    suggested_fix: "Use if (entry.workerHost != null) or validate sshHosts entries are non-empty."

  - id: 24
    scenario: S-1259
    status: OPEN
    severity: High
    invariant_violated: "Retry backoff SHALL persist across state transitions — terminal transition SHALL NOT erase backoff"
    code_location: "ts/packages/orchestrator/src/index.ts — cleanupIssue (line 232: this.state.retryAttempts.delete(issueId))"
    explanation: >
      cleanupIssue() unconditionally deletes retry entries when an issue transitions to terminal state. If the issue is later reopened
      (terminal -> active), the retry backoff is completely erased. The issue is immediately re-dispatched without delay, and the attempt
      counter resets, preventing backoff escalation. This creates an infinite rapid-retry loop.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"retry-bypass","identifier":"RB-1","title":"Retry Bypass","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5,"maxRetryBackoffMs":60000}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":false,"turnCount":1,"latencyPerTurnMs":0}},"pollTicks":4,"tickDelayMs":100,"timedMutations":[{"afterMs":100,"mutate":{"type":"change_state","issueId":"retry-bypass","state":"Done","stateType":"completed"}},{"afterMs":150,"mutate":{"type":"change_state","issueId":"retry-bypass","state":"In Progress","stateType":"started"}}],"assertions":[{"type":"retry_count","issueId":"retry-bypass","minAttempts":2}]}'
    suggested_fix: |
      cleanupIssue(issueId: string): void {
        // ... remove from running/claimed ...
        // DON'T delete retryAttempts — let it expire naturally
        // this.state.retryAttempts.delete(issueId);  // REMOVED
        this.state.completed.add(issueId);
      }

  - id: 25
    scenario: S-1260
    status: OPEN
    severity: Low
    invariant_violated: "eligibleIssues reported count SHALL match actual dispatchable count"
    code_location: "ts/packages/orchestrator/src/index.ts — eligibleIssues (stale runningCount during filtering)"
    explanation: >
      eligibleIssues() computes runningCount and runningByState ONCE before filtering. As the dispatch loop claims issues (adding to
      running), the actual count increases but the filter has already passed all issues. Issues that pass the filter but fail in claim()
      get dispatch_skipped events but never appear in blockedDispatches.

  - id: 26
    scenario: S-1260
    round: 10
    status: OPEN
    severity: High
    invariant_violated: "Global concurrency cap SHALL be a hard limit per poll tick, not bypassable by fast-completing runs"
    code_location: "ts/packages/runtime/src/index.ts — pollOnceUnlocked (dispatch loop with await points)"
    explanation: >
      The dispatch loop calls await this.maybeDispatch(issue) for each eligible issue. maybeDispatch awaits fetchIssueForDispatch
      (an async call). This await creates a yield point where the event loop processes microtasks. If a runner completes with 0ms
      latency, its finish() removes the entry from running. By the time the next issue's claim() is called, running.size is back to 0,
      bypassing the cap.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"a","identifier":"A-1","title":"Issue A","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1},{"id":"b","identifier":"B-1","title":"Issue B","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":2},{"id":"c","identifier":"C-1","title":"Issue C","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":3}],"settingsOverrides":{"agent":{"maxConcurrentAgents":1}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":0}},"pollTicks":1,"assertions":[{"type":"event_not_occurred","eventType":"run_started","messageContains":"B-1"},{"type":"event_not_occurred","eventType":"run_started","messageContains":"C-1"}]}'
    suggested_fix: |
      let dispatchedThisCycle = 0;
      for (const issue of eligible) {
        if (dispatchedThisCycle >= this.workflow.settings.agent.maxConcurrentAgents) break;
        const claimed = await this.maybeDispatch(issue);
        if (claimed) dispatchedThisCycle++;
      }

  - id: 27
    scenario: S-1261
    status: OPEN
    severity: High
    invariant_violated: "Per-host SSH capacity cap SHALL prevent unbounded dispatches to a single remote host"
    code_location: "ts/packages/runtime/src/index.ts — pollOnceUnlocked and ts/packages/orchestrator/src/index.ts — selectWorkerHost"
    explanation: >
      Same underlying microtask-ordering bug as Failure 26, but targeting per-host capacity. Fast-completing runs remove themselves
      from the running map during the dispatch loop's await points. selectWorkerHost() then sees count=0 for the host and allows
      the next dispatch.
    reproduction: |
      npx tsx demo/sandbox.ts --inline '{"issues":[{"id":"a","identifier":"A-1","title":"Issue A","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":1},{"id":"b","identifier":"B-1","title":"Issue B","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":2},{"id":"c","identifier":"C-1","title":"Issue C","state":"In Progress","stateType":"started","labels":[],"blockers":[],"priority":3}],"settingsOverrides":{"agent":{"maxConcurrentAgents":5},"worker":{"sshHosts":["host1"],"maxConcurrentAgentsPerHost":1}},"runnerConfig":{"defaultBehavior":{"shouldSucceed":true,"turnCount":1,"latencyPerTurnMs":0}},"pollTicks":1,"assertions":[{"type":"event_not_occurred","eventType":"run_started","messageContains":"B-1"},{"type":"event_not_occurred","eventType":"run_started","messageContains":"C-1"}]}'
    suggested_fix: "Same as Failure 26: track dispatches-this-cycle independently."


# Pre-commit config for prek (https://github.com/j178/prek)
# Install hooks: prek install --hook-type pre-push
repos:
  - repo: local
    hooks:
      - id: mise-check
        name: mise run check (lint, type-check, tests)
        entry: bash -c 'mise run check'
        language: system
        pass_filenames: false
        stages: [pre-push]

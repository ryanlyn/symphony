services:
  worker1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${LORENZ_LIVE_DOCKER_WORKER_1_PORT}:22"
    volumes:
      - ${LORENZ_LIVE_DOCKER_AUTHORIZED_KEY}:/run/lorenz/ssh/authorized_key.pub:ro
      - ${LORENZ_LIVE_DOCKER_CODEX_AUTH_JSON}:/root/.codex/auth.json:ro
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${LORENZ_LIVE_DOCKER_CLAUDE_CODE_OAUTH_TOKEN}

  worker2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${LORENZ_LIVE_DOCKER_WORKER_2_PORT}:22"
    volumes:
      - ${LORENZ_LIVE_DOCKER_AUTHORIZED_KEY}:/run/lorenz/ssh/authorized_key.pub:ro
      - ${LORENZ_LIVE_DOCKER_CODEX_AUTH_JSON}:/root/.codex/auth.json:ro
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${LORENZ_LIVE_DOCKER_CLAUDE_CODE_OAUTH_TOKEN}
